name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target (testpypi or pypi)"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi

env:
  PACKAGE_NAME: panlabel
  PYTHON_VERSION: "3.12"

permissions: {}

jobs:
  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  macos-x86_64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          args: --release --locked --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-x86_64
          path: dist

  macos-aarch64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: PyO3/maturin-action@v1
        with:
          target: aarch64-apple-darwin
          args: --release --locked --out dist
      - name: Test wheel
        run: |
          pip install dist/*.whl --force-reinstall
          panlabel --help
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-aarch64
          path: dist

  linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: PyO3/maturin-action@v1
        with:
          target: x86_64-unknown-linux-gnu
          manylinux: "2_17"
          args: --release --locked --out dist
      - name: Test wheel
        run: |
          pip install dist/*.whl --force-reinstall
          panlabel --help
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-x86_64
          path: dist

  linux-aarch64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: PyO3/maturin-action@v1
        with:
          target: aarch64-unknown-linux-gnu
          manylinux: "2_17"
          args: --release --locked --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-aarch64
          path: dist

  windows-x86_64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: PyO3/maturin-action@v1
        with:
          target: x86_64-pc-windows-msvc
          args: --release --locked --out dist
      - name: Test wheel
        shell: bash
        run: |
          pip install dist/*.whl --force-reinstall
          panlabel --help
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x86_64
          path: dist

  publish-testpypi:
    needs:
      - sdist
      - macos-x86_64
      - macos-aarch64
      - linux-x86_64
      - linux-aarch64
      - windows-x86_64
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'testpypi' }}
    runs-on: ubuntu-latest
    environment:
      name: test-pypi
    permissions:
      id-token: write
    steps:
      - uses: astral-sh/setup-uv@v5
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: wheels
          merge-multiple: true
      - name: Publish to TestPyPI
        run: uv publish --publish-url https://test.pypi.org/legacy/ wheels/*

  publish-pypi:
    needs:
      - sdist
      - macos-x86_64
      - macos-aarch64
      - linux-x86_64
      - linux-aarch64
      - windows-x86_64
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'pypi') }}
    runs-on: ubuntu-latest
    environment:
      name: release
    permissions:
      id-token: write
    steps:
      - uses: astral-sh/setup-uv@v5
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: wheels
          merge-multiple: true
      - name: Publish to PyPI
        run: uv publish wheels/*
